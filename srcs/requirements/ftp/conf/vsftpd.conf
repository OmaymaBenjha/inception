# Listen on IPv4
listen=YES
listen_ipv6=NO

# Disable anonymous FTP
anonymous_enable=NO

# Enable local users
local_enable=YES

# Enable write access
write_enable=YES

# Set local umask
local_umask=022

# Chroot users to home directories
chroot_local_user=YES
allow_writeable_chroot=YES

# Directory messages
dirmessage_enable=YES

# Logging
xferlog_enable=YES
xferlog_file=/var/log/vsftpd.log
log_ftp_protocol=YES

# Connection settings
ftpd_banner=Welcome to FTP Server
max_clients=50
max_per_ip=5

# Passive mode configuration
pasv_enable=YES
pasv_min_port=50000
pasv_max_port=50100
pasv_address=oben-jha.42.fr

# Security settings
ssl_enable=NO  # We'll enable this later with SSL
userlist_enable=YES
userlist_file=/etc/vsftpd.user_list
userlist_deny=NO

# Performance
use_localtime=YES