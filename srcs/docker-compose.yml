
services:
  mariadb:
    build: ./requirements/mariadb
    image: mariadb           # <--- ADDED: Forces image name to match service name
    container_name: mariadb
    restart: always
    env_file: .env
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - inception

  wordpress:
    build: ./requirements/wordpress
    image: wordpress         # <--- ADDED: Forces image name to match service name
    container_name: wordpress
    restart: always
    env_file: .env
    depends_on:
      - mariadb
    volumes:
      - wp-data:/var/www/html
    networks:
      - inception

  nginx:
    build: ./requirements/nginx
    image: nginx             # <--- ADDED: Forces image name to match service name
    container_name: nginx
    restart: always
    ports:
      - "443:443"            # Correct: Only port 443 is exposed
    depends_on:
      - wordpress
    volumes:
      - wp-data:/var/www/html
    networks:
      - inception

networks:
  inception:
    driver: bridge

volumes:
  db-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/oben-jha/data/mariadb   # <--- FIXED: Hardcoded to avoid 'sudo' root path errors
  wp-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/oben-jha/data/wordpress # <--- FIXED: Hardcoded to avoid 'sudo' root path errors